name: Publish container image

# Two ways in:
#   - workflow_call: invoked by release-please.yml's publish job on a release.
#   - workflow_dispatch: manual rebuild of an already-tagged version.
# Both take an explicit `version` so the image tags (X.Y.Z / X.Y / X / latest)
# are derived from it rather than from the Git ref — which means a manual
# rebuild produces the full version tag set, not just `latest`.
on:
  workflow_call:
    inputs:
      version:
        description: Semantic version to tag the image with, e.g. 0.2.0
        required: true
        type: string
      ref:
        description: Git ref to build (defaults to v<version>)
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to build & tag, e.g. 0.2.0
        required: true
        type: string
      ref:
        description: Git ref to build (defaults to v<version>)
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || format('v{0}', inputs.version) }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/diegopeixoto/posterpilot
          tags: |
            type=raw,value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
