name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build & push the container image as part of THIS run, gated on a release
  # being cut. Done here (not in a separate tag-triggered workflow) because the
  # tag release-please pushes is created with the default GITHUB_TOKEN, and
  # GitHub deliberately does not dispatch new workflow runs from GITHUB_TOKEN
  # events — so a `push: tags` trigger would silently never fire. Running it as
  # a dependent job sidesteps that entirely.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      ref: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
